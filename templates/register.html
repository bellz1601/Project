{% extends "base.html" %}
{% block title %}สมัครสมาชิก{% endblock %}
{% block content %}
<form method="post" class="bg-white rounded-2xl shadow p-6 space-y-4 max-w-xl">
  <div class="grid md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm mb-1">ชื่อผู้ใช้</label>
      <input name="username" value="{{ username or '' }}" class="w-full border rounded-xl p-2" required>
    </div>
    <div>
      <label class="block text-sm mb-1">รหัสผ่าน</label>
      <input type="password" name="password" class="w-full border rounded-xl p-2" required>
    </div>
    <div>
      <label class="block text-sm mb-1">ยืนยันรหัสผ่าน</label>
      <input type="password" name="confirm" class="w-full border rounded-xl p-2" required>
    </div>
  </div>
  <div class="flex items-center justify-end">
    <button class="px-4 py-2 rounded-xl bg-emerald-600 text-white">สมัครสมาชิก</button>
  </div>
</form>
{% endblock %}
